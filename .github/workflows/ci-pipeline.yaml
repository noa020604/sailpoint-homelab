
name: CI Pipeline - Build and Push

# Trigger only when code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # Specifies the OS for the virtual runner that executes the pipeline steps
    runs-on: ubuntu-latest
    # Prevent infinite loops by skipping the workflow if it was triggered by an automated tag update commit
    if: "!contains(github.event.head_commit.message, 'chore: update image tag')"
    permissions:
      # Required to clone and read the repository code AND push automated changes back
      contents: write
      # Required to upload/publish the image to GitHub Packages (GHCR)
      packages: write

    steps:
      - name: Checkout code
        # Downloads the repository source code to the runner
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Temporary token generated by GitHub with write permissions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        # Identifier so subsequent steps can reference its outputs
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Generates the default 'latest' tag
          # Generates a unique tag based on the Git Commit SHA for GitOps tracing
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Look for the Dockerfile in the root directory
          context: .
          # Push the image immediately to the registry after building
          push: true
          # Uses calculated tags (latest + Git SHA)
          tags: ${{ steps.meta.outputs.tags }}
          # Attaches Git metadata labels to the image
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Helm values
        # Update the image tag in values.yaml to match the current Git commit SHA for traceability
        # Make sure the path 'url-shortner-chart/values.yaml' matches your repository structure
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" url-shortner-chart/values.yaml
          
          # Configure Git user for the automated commit
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Stage, commit, and push the updated values file back to the repository
          git add url-shortner-chart/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push